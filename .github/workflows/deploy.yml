name: Deploy to fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create volume if it doesn't exist
        run: |
          if ! flyctl volumes list -a personalassist | grep -q 'chroma_data'; then
            flyctl volumes create chroma_data -r iad -n 1 -a personalassist --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only -a personalassist
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

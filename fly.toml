# fly.toml app configuration file generated for personalassist on 2026-03-05T05:03:36Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personalassist'
primary_region = 'iad'

[build]

[env]
  USER_TIMEZONE = "America/Los_Angeles"
  CHROMA_PATH = "/data/chroma_db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = "chroma_data"
  destination = "/data/chroma_db"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
